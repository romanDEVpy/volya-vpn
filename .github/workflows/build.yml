name: Build VolyaVPN APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleFdroidDebug --no-daemon

      - name: Collect APKs
        run: |
          mkdir -p dist
          find . -path "./V2rayNG/app/build/outputs/apk/fdroid/debug/*.apk" -exec cp {} dist/ \;
          ls -la dist/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: VolyaVPN-Debug-APK
          path: V2rayNG/app/build/outputs/apk/fdroid/debug/*.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.event_name != 'pull_request'
        with:
          tag_name: v${{ github.run_number }}
          name: VolyaVPN Build ${{ github.run_number }}
          body: |
            Auto-built VolyaVPN APK
            - Date: ${{ github.event.head_commit.timestamp || 'manual' }}
            - Commit: ${{ github.sha }}
          files: V2rayNG/app/build/outputs/apk/fdroid/debug/*.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
